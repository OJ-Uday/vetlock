# vetlock's own PR check — dogfoods the tool on this very repo.
name: vetlock (dogfood)
on:
  pull_request:
    paths:
      - '**/pnpm-lock.yaml'
      - '**/package-lock.json'
      # Python lockfiles: vetlock auto-detects format from filename
      - '**/requirements*.txt'
      - '**/poetry.lock'
      - '**/uv.lock'

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  vetlock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with: { node-version: '20' }
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with: { version: 9 }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Self-diff against base
        run: |
          set -euo pipefail
          # This repo uses pnpm-lock.yaml (not package-lock.json).
          # Fetch the base version of the lockfile and diff it.
          git show "${{ github.event.pull_request.base.sha }}:pnpm-lock.yaml" > /tmp/before.yaml 2>/dev/null || cp pnpm-lock.yaml /tmp/before.yaml
          # A BLOCK verdict is a useful analyst signal, not by itself a failed
          # dogfood run. Capture it once as JSON so the versioned gate can show
          # every finding and apply its explicit high-confidence policy.
          set +e
          node packages/cli/dist/cli.js diff /tmp/before.yaml pnpm-lock.yaml --json > /tmp/vetlock.json
          scan_status=$?
          # Keep the policy exit code while still allowing it to print a full
          # report for a failing policy decision.
          node scripts/vetlock-dogfood-policy.cjs /tmp/vetlock.json
          policy_status=$?
          set -e
          # Vetlock's documented non-success analysis result is 2 (BLOCK).
          # Any other CLI failure means the JSON cannot be trusted and must fail.
          if [ "$scan_status" -ne 0 ] && [ "$scan_status" -ne 2 ]; then
            echo "Vetlock analysis failed with exit code $scan_status" >&2
            exit "$scan_status"
          fi
          exit "$policy_status"
