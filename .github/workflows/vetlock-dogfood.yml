# vetlock's own PR check — dogfoods the tool on this very repo.
name: vetlock (dogfood)
on:
  pull_request:
    paths:
      - '**/pnpm-lock.yaml'
      - '**/package-lock.json'
      # Python lockfiles: vetlock auto-detects format from filename
      - '**/requirements*.txt'
      - '**/poetry.lock'
      - '**/uv.lock'

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  vetlock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with: { node-version: '20' }
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with: { version: 9 }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Self-diff against base
        run: |
          set -e
          # This repo uses pnpm-lock.yaml (not package-lock.json).
          # Fetch the base version of the lockfile and diff it.
          git show HEAD~1:pnpm-lock.yaml > /tmp/before.yaml 2>/dev/null || cp pnpm-lock.yaml /tmp/before.yaml
          node packages/cli/dist/cli.js diff /tmp/before.yaml pnpm-lock.yaml --md > /tmp/vetlock.md
          cat /tmp/vetlock.md
          # Fail on the classic worm signatures.
          node packages/cli/dist/cli.js diff /tmp/before.yaml pnpm-lock.yaml \
            --fail-on install.script-added,env.token-harvest,net.new-endpoint
